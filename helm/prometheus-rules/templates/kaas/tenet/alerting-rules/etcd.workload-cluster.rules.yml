apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  creationTimestamp: null
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: etcd.workload-cluster.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
  - name: etcd
    rules:
    - alert: WorkloadClusterEtcdDown
      annotations:
        description: '{{`Etcd ({{ $labels.pod }}) on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} is down.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: up{cluster_type="workload_cluster", app="etcd", provider!~"eks|aks"} == 0
      for: 20m
      labels:
        area: kaas
        cancel_if_outside_working_hours: {{ include "workingHoursOnly" . }}
        cancel_if_control_plane_node_down: "true"
        cancel_if_kubelet_down: "true"
        severity: page
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdCommitDurationTooHigh
      annotations:
        description: '{{`Etcd ({{ $labels.pod }}) on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} has a too high commit duration.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: histogram_quantile(0.99, rate(etcd_disk_backend_commit_duration_seconds_bucket{cluster_type="workload_cluster", provider!~"eks|aks"}[5m])) > 0.25
      for: 15m
      labels:
        area: kaas
        severity: notify
        cancel_if_outside_working_hours: "true"
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdWALFsyncDurationTooHigh
      annotations:
        description: '{{`Etcd ({{ $labels.pod }}) on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} has a too high WAL fsync duration, indicating slow disk I/O that can cascade into leader elections and quorum loss.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket{cluster_type="workload_cluster", provider!~"eks|aks"}[5m])) > 0.5
      for: 15m
      labels:
        area: kaas
        severity: notify
        cancel_if_outside_working_hours: "true"
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdDBSizeTooLarge
      annotations:
        description: '{{`Etcd ({{ $labels.pod }}) on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} has a too large database.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: (etcd_mvcc_db_total_size_in_bytes{cluster_type="workload_cluster", provider!~"eks|aks"} / etcd_server_quota_backend_bytes{cluster_type="workload_cluster", provider!~"eks|aks"}) * 100 > 80
      for: 15m
      labels:
        area: kaas
        severity: notify
        cancel_if_outside_working_hours: "true"
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdNumberOfLeaderChangesTooHigh
      annotations:
        description: '{{`Etcd ({{ $labels.pod }}) on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} has too many leader changes.`}}'
      expr: increase(etcd_server_leader_changes_seen_total{cluster_type="workload_cluster", provider!~"eks|aks"}[1h]) > 8
      labels:
        area: kaas
        severity: notify
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdHasNoLeader
      annotations:
        description: '{{`Etcd ({{ $labels.pod }}) on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} has no leader.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: etcd_server_has_leader{cluster_type="workload_cluster", container!="loki", provider!~"eks|aks"} == 0
      for: 35m
      labels:
        area: kaas
        cancel_if_outside_working_hours: {{ include "workingHoursOnly" . }}
        severity: page
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdQuorumLost
      annotations:
        description: '{{`Etcd on workload cluster {{ $labels.installation }}/{{ $labels.cluster_id }} has lost quorum: a majority of members report no leader.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: count by (cluster_id, installation, pipeline, provider)(etcd_server_has_leader{app="etcd", cluster_type="workload_cluster", provider!~"eks|aks"} == 0) / count by (cluster_id, installation, pipeline, provider)(etcd_server_has_leader{app="etcd", cluster_type="workload_cluster", provider!~"eks|aks"}) > 0.5
      for: 2m
      labels:
        area: kaas
        cancel_if_outside_working_hours: {{ include "workingHoursOnly" . }}
        severity: notify
        team: tenet
        topic: etcd
    - alert: WorkloadClusterEtcdMetricsMissing
      annotations:
        description: '{{`Etcd metrics missing for cluster {{ $labels.installation }}/{{ $labels.cluster_id }}.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/etcd-troubleshooting/
      expr: count(up{cluster_type="workload_cluster", provider!~"eks|aks"}) by (cluster_id, installation, pipeline, provider) unless count(etcd_server_id{cluster_type="workload_cluster", provider!~"eks|aks"}) by (cluster_id, installation, pipeline, provider)
      for: 1h
      labels:
        area: kaas
        cancel_if_outside_working_hours: "true"
        severity: page
        team: tenet
        topic: etcd
