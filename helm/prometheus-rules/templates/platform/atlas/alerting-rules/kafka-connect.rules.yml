apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: kafka-connect.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
    - name: kafka-connect
      rules:
        - alert: KafkaConnectContainersDown
          annotations:
            description: All Kafka Connect containers have been down or in CrashLoopBackOff status for 3 minutes.
            summary: All Kafka Connect containers down or in CrashLoopBackOff status.
          expr: absent(container_last_seen{container=~".+-connect",pod=~".+-connect-.+"})
          for: 3m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
        - alert: KafkaConnectFailedConnector
          annotations:
            description: '{{`Kafka instance on pod {{ $labels.namespace }}/{{ $labels.pod }} has {{ $value }} connector(s) in failed state during last 5 minutes.`}}'
            summary: Kafka Connect Connector failure.
          expr: sum(kafka_connect_connector_status{status="failed"}) by (namespace, pod) > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
        - alert: KafkaConnectFailedTask
          annotations:
            description: '{{`Kafka instance on pod {{ $labels.namespace }}/{{ $labels.pod }} has {{ $value }} task(s) in failed state during last 5 minutes.`}}'
            summary: Kafka Connect Task failure.
          expr: sum(kafka_connect_worker_connector_failed_task_count) by (namespace, pod) > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
