# Originally imported from upstream Strimzi example PrometheusRules:
#   https://github.com/strimzi/strimzi-kafka-operator/tree/1.0.0/examples/metrics/prometheus-install/prometheus-rules
# then adapted to Giant Swarm atlas conventions (common labels, rule names,
# team/area/severity labels, pint-compliant aggregations) and rewritten to the
# strimziMetricsReporter metric names actually exported on our clusters.
#
# These files are now hand-maintained -- there is no regeneration script.
# See kafka/MONITORING.md for the metric-name mapping and cluster-side setup.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: kafka-connect.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
    - name: kafka-connect
      rules:
        - alert: KafkaConnectFailedConnector
          expr: sum(kafka_connect_connector_metrics_status_info{status="failed"}) by (cluster_id, installation, pipeline, provider, namespace, pod) > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka Connect Connector Failure'
            description: '{{`Kafka instance on pod {{ $labels.namespace }}/{{ $labels.pod }} has {{ $value }} connector(s) in failed state during last 5 minutes`}}'
        - alert: KafkaConnectFailedTask
          expr: sum(kafka_connect_connect_worker_metrics_connector_failed_task_count) by (cluster_id, installation, pipeline, provider, namespace, pod) > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka Connect Task Failure'
            description: '{{`Kafka instance on pod {{ $labels.namespace }}/{{ $labels.pod }} has {{ $value }} task(s) in failed state during last 5 minutes`}}'
