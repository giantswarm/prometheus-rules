apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: kafka.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
    - name: kafka
      rules:
        - alert: KafkaRunningOutOfSpace
          expr: kubelet_volume_stats_available_bytes{persistentvolumeclaim=~"data(-[0-9]+)?-(.+)-(kafka|broker|controller)-[0-9]+"} * 100 / kubelet_volume_stats_capacity_bytes{persistentvolumeclaim=~"data(-[0-9]+)?-(.+)-(kafka|broker|controller)-[0-9]+"} < 15
          for: 10m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka is running out of free disk space'
            description: '{{`There are only {{ $value }} percent available at {{ $labels.persistentvolumeclaim }} PVC`}}'
        - alert: KafkaUnderReplicatedPartitions
          expr: kafka_server_replicamanager_underreplicatedpartitions > 0
          for: 10m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka under replicated partitions'
            description: '{{`There are {{ $value }} under replicated partitions on {{ $labels.kubernetes_pod_name }}`}}'
        - alert: KafkaAbnormalControllerState
          expr: sum(kafka_controller_kafkacontroller_activecontrollercount) by (cluster_id, installation, pipeline, provider, strimzi_io_name, namespace) != 1
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka abnormal controller state'
            description: '{{`Kafka instance {{ $labels.strimzi_io_name }} on namespace {{ $labels.namespace }} has {{ $value }} active controllers`}}'
        - alert: KafkaOfflinePartitions
          expr: sum(kafka_controller_kafkacontroller_offlinepartitionscount) by (cluster_id, installation, pipeline, provider, namespace, pod) > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka offline partitions'
            description: '{{`Kafka instance on pod {{ $labels.namespace }}/{{ $labels.pod }} has {{ $value }} partition(s) with no leader`}}'
        - alert: KafkaUnderMinIsrPartitionCount
          expr: kafka_server_replicamanager_underminisrpartitioncount > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka under min ISR partitions'
            description: '{{`There are {{ $value }} partitions under the min ISR on {{ $labels.kubernetes_pod_name }}`}}'
        - alert: KafkaOfflineReplicas
          expr: kafka_server_replicamanager_offlinereplicacount > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka has offline replicas'
            description: '{{`There are {{ $value }} offline replica(s) on {{ $labels.kubernetes_pod_name }}, indicating a failed or offline log directory`}}'
        - alert: KafkaScrapeProblem
          expr: up{kubernetes_namespace!~"openshift-.+",kubernetes_pod_name=~".+-(kafka|broker|controller)-[0-9]+"} == 0
          for: 3m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: '{{`Prometheus unable to scrape metrics from {{ $labels.kubernetes_pod_name }}/{{ $labels.instance }}`}}'
            description: '{{`Prometheus was unable to scrape metrics from {{ $labels.kubernetes_pod_name }}/{{ $labels.instance }} for more than 3 minutes`}}'
        - alert: KafkaBrokerContainersDown
          expr: absent(container_last_seen{container="kafka",pod=~".+-(kafka|broker|controller)-[0-9]+"})
          for: 3m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'All `kafka` containers down or in CrashLookBackOff status'
            description: 'All `kafka` containers have been down or in CrashLookBackOff status for 3 minutes'
        - alert: KafkaContainerRestartingTooOften
          expr: max by (cluster_id, installation, pipeline, provider, namespace, pod) (increase(kube_pod_container_status_restarts_total{container="kafka", pod=~".+-(kafka|broker|controller)-[0-9]+"}[1h])) > 5
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka container restarting too often'
            description: '{{`Kafka container in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $value }} times in the last hour`}}'
        - alert: KafkaBrokerFenced
          expr: max by (cluster_id, installation, pipeline, provider, strimzi_io_name, namespace) (kafka_controller_kafkacontroller_fencedbrokercount) > 0
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka broker fenced from the cluster'
            description: '{{`Kafka cluster {{ $labels.strimzi_io_name }} in namespace {{ $labels.namespace }} has {{ $value }} fenced (unavailable) broker(s)`}}'
        - alert: KafkaBrokerNotRunning
          expr: kafka_server_kafkaserver_brokerstate != 3
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka broker not in running state'
            description: '{{`Kafka broker {{ $labels.namespace }}/{{ $labels.pod }} is not in the running state (state {{ $value }}) for more than 5 minutes`}}'
        - alert: KafkaFailedProduceRequests
          expr: sum by (cluster_id, installation, pipeline, provider, namespace, pod) (rate(kafka_server_brokertopicmetrics_failedproducerequestspersec_total[5m])) > 1
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka broker is failing produce requests'
            description: '{{`Kafka broker {{ $labels.namespace }}/{{ $labels.pod }} is rejecting {{ $value }} produce request(s) per second`}}'
        - alert: KafkaFailedFetchRequests
          expr: sum by (cluster_id, installation, pipeline, provider, namespace, pod) (rate(kafka_server_brokertopicmetrics_failedfetchrequestspersec_total[5m])) > 1
          for: 5m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Kafka broker is failing fetch requests'
            description: '{{`Kafka broker {{ $labels.namespace }}/{{ $labels.pod }} is rejecting {{ $value }} fetch request(s) per second`}}'
