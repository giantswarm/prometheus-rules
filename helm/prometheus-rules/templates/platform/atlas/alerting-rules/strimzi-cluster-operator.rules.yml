apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: strimzi-cluster-operator.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
    - name: strimzi-cluster-operator
      rules:
        - alert: StrimziClusterOperatorContainerDown
          expr: count by (cluster_id, installation, pipeline, provider) ((container_last_seen{container="strimzi-cluster-operator"} > (time() - 90))) < 1 or absent(container_last_seen{container="strimzi-cluster-operator"})
          for: 1m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Cluster Operator down'
            description: 'The Cluster Operator has been down for longer than 90 seconds'
