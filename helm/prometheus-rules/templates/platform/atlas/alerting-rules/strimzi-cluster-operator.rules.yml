apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: strimzi-cluster-operator.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
    - name: cluster-operator
      rules:
        - alert: StrimziClusterOperatorContainerDown
          annotations:
            description: The Strimzi Cluster Operator has been down for longer than 90 seconds.
            summary: Strimzi Cluster Operator down.
          expr: count((container_last_seen{container="strimzi-cluster-operator"} > (time() - 90))) < 1 or absent(container_last_seen{container="strimzi-cluster-operator"})
          for: 1m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
