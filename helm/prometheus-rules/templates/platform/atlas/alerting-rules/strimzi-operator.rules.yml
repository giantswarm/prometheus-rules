apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: strimzi-operator.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
    - name: strimzi-operator
      rules:
        - alert: StrimziReconciliationFailing
          expr: sum by (cluster_id, installation, pipeline, provider, namespace, kind) (rate(strimzi_reconciliations_failed_total[10m])) > 0
          for: 15m
          labels:
            area: platform
            severity: none
            team: atlas
            topic: kafka
          annotations:
            summary: 'Strimzi operator failing to reconcile resources'
            description: '{{`Strimzi is failing to reconcile {{ $labels.kind }} resources in namespace {{ $labels.namespace }}`}}'
