apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  creationTimestamp: null
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: cilium.rules
  namespace: {{ .Values.namespace  }}
spec:
  groups:
  - name: cilium
    rules:
    - alert: CiliumBPFMapAlmostFull
      annotations:
        description: '{{`Cilium BPF map is about to fill up.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-bpf-map/
      expr: avg(cilium_bpf_map_pressure) by (cluster_id, installation, pipeline, provider, map_name) * 100 > 80
      for: 15m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        severity: page
        team: cabbage
        topic: cilium
    - alert: CiliumBPFMapFull
      annotations:
        description: '{{`Cilium BPF map is about filled up.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-bpf-map/
      expr: avg(cilium_bpf_map_pressure) by (cluster_id, installation, pipeline, provider, map_name) * 100 > 95
      for: 15m
      labels:
        area: platform
        severity: page
        team: cabbage
        topic: cilium
    - alert: CiliumAPITooSlow
      annotations:
        description: '{{`Cilium API processing time is >50s pod="{{ $labels.pod }}" node="{{ $labels.node }}" method="{{ $labels.method}}" path="{{ $labels.path }}"`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-performance-issues/#slow-cilium-api
      expr: avg(rate(cilium_agent_api_process_time_seconds_sum{}[5m])/rate(cilium_agent_api_process_time_seconds_count{}[5m]) > 50) by (cluster_id, node, pod, method, path, installation, pipeline, provider)
      for: 20m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        severity: page
        team: cabbage
        topic: cilium
    - alert: CiliumNetworkPolicyFailed
      annotations:
        description: '{{`Too many Cilium Network Policy errors.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/unsupported-cilium-network-policy/
      # cilium_policy_change_total - for cilium >=1.15
      # cilium_policy_import_errors_total - for cilium <1.15
      expr: max(rate(cilium_policy_change_total{outcome=~"fail.*"}[20m]) OR rate(cilium_policy_import_errors_total[20m])) by (cluster_id, installation, pipeline, provider) > 0
      for: 10m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        severity: page
        team: cabbage
        topic: cilium
    - alert: FluxHelmReleaseFailed
      annotations:
        description: |-
          {{`Flux HelmRelease {{ $labels.name }} in ns {{ $labels.exported_namespace }} on {{ $labels.installation }}-{{ $labels.cluster_id }} is stuck in Failed state.`}}
        runbook_url: '{{`https://intranet.giantswarm.io/docs/support-and-ops/runbooks/flux-helmrelease-failed/?INSTALLATION={{ $labels.installation }}&CLUSTER={{ $labels.cluster_id }}&NAMESPACE={{ $labels.exported_namespace }}&HELMRELEASE_NAME={{ $labels.name }}`}}'
      expr: gotk_resource_info{ready="False", customresource_kind="HelmRelease", cluster_type="management_cluster", exported_namespace!="flux-giantswarm", exported_namespace!~"org-t-.*", name=~".*(cilium|network-policies)"} > 0
      for: 1h10m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        cancel_if_kube_state_metrics_down: "true"
        cancel_if_monitoring_agent_down: "true"
        severity: page
        team: cabbage
        topic: cilium
        namespace: |-
          {{`{{ $labels.exported_namespace }}`}}
    - alert: CiliumAgentPodPending
      annotations:
        description: '{{`Pod {{ $labels.namespace }}/{{ $labels.pod }} is stuck in Pending in cluster {{ $labels.installation }}/{{ $labels.cluster_id }}.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/pod-stuck-in-pending/
      expr: kube_pod_status_phase{namespace="kube-system",pod=~"(cilium-.*)",phase="Pending"} == 1
      for: 15m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        cancel_if_kube_state_metrics_down: "true"
        cancel_if_cluster_has_no_workers: "true"
        severity: page
        team: cabbage
        topic: cilium
    - alert: CiliumOperatorPodRestartingTooOften
      annotations:
        description: '{{`cilium-operator is restarting too often in cluster {{ $labels.installation }}/{{ $labels.cluster_id }}.`}}'
        runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-troubleshooting/
      expr: 1 - sum(increase(kube_pod_container_status_restarts_total{container="cilium-operator"}[10m])) by (container, cluster_id, cluster_type, customer, installation, pipeline, provider, region)/100 < 0.98
      for: 10m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        cancel_if_kube_state_metrics_down: "true"
        cancel_if_cluster_has_no_workers: "true"
        severity: page
        team: cabbage
        topic: cilium
    - alert: CiliumHubbleTLSCertificateWillExpireSoon
      annotations:
        description: '{{`Hubble TLS certificate {{ $labels.secretkey }} in Secret {{ $labels.exported_namespace }}/{{ $labels.name }} on {{ $labels.installation }}/{{ $labels.cluster_id }} will expire in less than 30 days. Hubble certificate renewal is broken on this cluster; hubble-relay will lose flow data when the certificate expires.`}}'
        runbook_url: '{{`https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-hubble-tls-certificates/?INSTALLATION={{ $labels.installation }}&CLUSTER={{ $labels.cluster_id }}`}}'
      # Covers leaf certs (tls.crt) and the embedded Cilium CA copy (ca.crt) in the hubble secrets.
      # With the cronJob renewal method leafs are re-issued every 4 months with 12 months validity,
      # so anything closer than 30 days to expiry means renewal is broken (or the cluster is still
      # on the legacy helm method, which never renews).
      expr: (cert_exporter_secret_not_after{name=~"hubble-server-certs|hubble-relay-client-certs|hubble-relay-server-certs|hubble-ui-client-certs"} - time()) < 30 * 24 * 60 * 60
      for: 5m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        severity: page
        team: cabbage
        topic: cilium
    - alert: CiliumHubbleCertificateRenewalJobFailed
      annotations:
        description: '{{`Hubble certificate renewal job {{ $labels.namespace }}/{{ $labels.job_name }} on {{ $labels.installation }}/{{ $labels.cluster_id }} failed. Certgen may be refusing to renew leaf certificates because the Cilium CA is close to expiry.`}}'
        runbook_url: '{{`https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-hubble-tls-certificates/?INSTALLATION={{ $labels.installation }}&CLUSTER={{ $labels.cluster_id }}`}}'
      expr: kube_job_failed{namespace="kube-system", job_name=~"hubble-generate-certs.*", condition="true"} == 1
      for: 15m
      labels:
        area: platform
        cancel_if_outside_working_hours: "true"
        cancel_if_kube_state_metrics_down: "true"
        severity: page
        team: cabbage
        topic: cilium
