apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  creationTimestamp: null
  labels:
    {{- include "labels.common" . | nindent 4 }}
  name: api-audit-logs.rules
  namespace: {{ .Values.namespace }}
spec:
  groups:
    - name: api-audit-logs
      rules:
        # Fires when a single kube-apiserver user (ServiceAccount / identity) on a
        # workload cluster sustains a high audit event rate, so the alert names the
        # workload responsible instead of just the cluster. A user fires when either:
        #   * its rate is more than 3x its own level 24h ago (runaway existing user), or
        #   * it had no audit traffic 24h ago at all (a freshly deployed workload /
        #     bad actor, which has no baseline to compare against).
        # Both branches share the `> 20` floor (20 events/s ~= 2.7 GiB/day at 1600
        # B/event) so a per-user trickle doesn't page. Tune the multiplier (3), the
        # floor (20) and the windows once real per-user traffic has been observed.
        - alert: WorkloadClusterAuditLogVolumeSpike
          annotations:
            description: >-
              User {{`{{ $labels.user }}`}} on workload cluster {{`{{ $labels.cluster_id }}`}} (installation {{`{{ $labels.installation }}`}})
              has been sustained at {{`{{ $value | humanize }}`}} API audit events/s — more than 3x its level 24h ago, or newly appeared — likely a workload flooding the API audit log.
            runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/workload-cluster-audit-log-volume/
            __dashboardUid__: api-audit-volume
          expr: |-
            (
                (
                  sum by (cluster_id, installation, pipeline, provider, customer, user) (
                    rate(k8s_api_audit_requests_total{cluster_type="workload_cluster"}[30m])
                  )
                > 20
                )
              and
                (
                  sum by (cluster_id, installation, pipeline, provider, customer, user) (
                    rate(k8s_api_audit_requests_total{cluster_type="workload_cluster"}[30m])
                  )
                >
                  3 * sum by (cluster_id, installation, pipeline, provider, customer, user) (
                    rate(k8s_api_audit_requests_total{cluster_type="workload_cluster"}[30m] offset 1d)
                  )
                )
            )
            or
            (
                (
                  sum by (cluster_id, installation, pipeline, provider, customer, user) (
                    rate(k8s_api_audit_requests_total{cluster_type="workload_cluster"}[30m])
                  )
                > 20
                )
              unless
                sum by (cluster_id, installation, pipeline, provider, customer, user) (
                  rate(k8s_api_audit_requests_total{cluster_type="workload_cluster"}[30m] offset 1d)
                )
            )
          for: 1h
          labels:
            area: platform
            cancel_if_outside_working_hours: "true"
            severity: notify
            team: shield
            topic: security
