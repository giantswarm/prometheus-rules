---
rule_files:
  - grafana.rules.yml

tests:
  - interval: 1m
    input_series:
      - series: 'up{service="grafana", cluster_id="golem", cluster_type="management_cluster", installation="golem", instance="grafana"}'
        values: "1+0x20 0+0x100"
    alert_rule_test:
      - alertname: GrafanaDown
        eval_time: 90m
        exp_alerts:
          - exp_labels:
              area: platform
              cancel_if_outside_working_hours: "true"
              cluster_id: "golem"
              cluster_type: management_cluster
              installation: "golem"
              instance: "grafana"
              service: "grafana"
              severity: page
              team: atlas
              topic: observability
            exp_annotations:
              description: "Grafana (grafana) is down."
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/grafana/?INSTALLATION=golem&CLUSTER=golem
              __dashboardUid__: qRQXmRnik
              dashboardQueryParams: "orgId=2"
  - interval: 1m
    input_series:
      # No lag for the first 20 minutes (lag = 0).
      # Then replication stops working for 50 minutes (lag increases 60 seconds per minute).
      # Then no lag again (lag = 0).
      - series: 'cnpg_pg_replication_lag{namespace="monitoring", pod="grafana-postgresql-1", cluster_id="golem", cluster_type="management_cluster", installation="golem"}'
        values: "0+0x20 0+60x50 0+0x20"
    alert_rule_test:
      - alertname: GrafanaPostgresqlReplicationFailure
        eval_time: 15m
        exp_alerts: []
      - alertname: GrafanaPostgresqlReplicationFailure
        eval_time: 30m
        exp_alerts: []
      - alertname: GrafanaPostgresqlReplicationFailure
        eval_time: 65m
        exp_alerts:
          - exp_labels:
              area: platform
              cancel_if_outside_working_hours: "true"
              installation: "golem"
              pod: grafana-postgresql-1
              severity: page
              team: atlas
              topic: observability
              cluster_id: "golem"
            exp_annotations:
              description: 'grafana-postgresql replication is lagging for pod grafana-postgresql-1.'
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/grafana/?INSTALLATION=golem&CLUSTER=golem
      - alertname: GrafanaPostgresqlReplicationFailure
        eval_time: 85m
        exp_alerts: []
  - interval: 1m
    input_series:
      # For the first 20 minutes there's no archiving failure.
      # Then, for the next 10 minutes, archiving fails so the last failed archived time is updated.
      # Then archiving works again for 20 minutes so the last failed archived time stays the same.
      - series: 'cnpg_pg_stat_archiver_last_failed_time{namespace="monitoring", pod="grafana-postgresql-1", cluster_id="golem", cluster_type="management_cluster", installation="golem"}'
        values: "-1+0x20 1200+60x10 1800+0x20"
      # For the first 20 minutes archiving works fine.
      # Then, for the next 10 minutes, the last archived time stays the same as archiving is not succeeding anymore.
      # Then archiving works again for 20 minutes
      - series: 'cnpg_pg_stat_archiver_last_archived_time{namespace="monitoring", pod="grafana-postgresql-1", cluster_id="golem", cluster_type="management_cluster", installation="golem"}'
        values: "0+60x20 1200+0x10 1800+60x20"
    alert_rule_test:
      - alertname: GrafanaPostgresqlArchivingFailure
        eval_time: 15m
        exp_alerts: []
      - alertname: GrafanaPostgresqlArchivingFailure
        eval_time: 30m
        exp_alerts:
          - exp_labels:
              area: platform
              cancel_if_outside_working_hours: "true"
              installation: "golem"
              pod: grafana-postgresql-1
              severity: page
              team: atlas
              topic: observability
              cluster_id: "golem"
            exp_annotations:
              description: 'grafana-postgresql archiving failed for pod grafana-postgresql-1.'
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/grafana/?INSTALLATION=golem&CLUSTER=golem
      - alertname: GrafanaPostgresqlArchivingFailure
        eval_time: 40m
        exp_alerts: []
  # Test: the most recent recovery test job that failed started after the most recent one that succeeded, for over 1 day, triggers the alert. A newer successful job clears it.
  - interval: 1m
    input_series:
      # start_time equals the time (in seconds) at which the job started, so each series only appears from that point on.
      # An job starts at 60s (minute 1) and succeeds.
      - series: 'kube_job_status_start_time{job_name="grafana-postgresql-recovery-test-001", namespace="monitoring", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x1 60+0x1459"
      - series: 'kube_job_complete{job_name="grafana-postgresql-recovery-test-001", namespace="monitoring", condition="true", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x1 1+0x1459"
      # A newer job starts at 120s (minute 2) and keeps failing.
      - series: 'kube_job_status_start_time{job_name="grafana-postgresql-recovery-test-002", namespace="monitoring", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x2 120+0x1458"
      - series: 'kube_job_failed{job_name="grafana-postgresql-recovery-test-002", namespace="monitoring", condition="true", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x2 1+0x1458"
      # At minute 1450, an even newer job starts (start_time 87000s = 1450 minutes) and succeeds, clearing the alert.
      - series: 'kube_job_status_start_time{job_name="grafana-postgresql-recovery-test-003", namespace="monitoring", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x1450 87000+0x10"
      - series: 'kube_job_complete{job_name="grafana-postgresql-recovery-test-003", namespace="monitoring", condition="true", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x1450 1+0x10"
    alert_rule_test:
      # Before 13h, alert is still pending - not firing.
      - alertname: GrafanaPostgresqlRecoveryTestFailed
        eval_time: 770m
        exp_alerts: []
      # After 13h of the latest job being a failure, alert fires.
      - alertname: GrafanaPostgresqlRecoveryTestFailed
        eval_time: 790m
        exp_alerts:
          - exp_labels:
              area: platform
              cancel_if_outside_working_hours: "true"
              installation: "golem"
              severity: page
              team: atlas
              topic: observability
              cluster_id: "golem"
              pipeline: "stable"
              provider: "aws"
            exp_annotations:
              description: 'grafana-postgresql db automated recovery test failed.'
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/grafana/?INSTALLATION=golem&CLUSTER=golem
      # After a newer successful job appears, alert clears.
      - alertname: GrafanaPostgresqlRecoveryTestFailed
        eval_time: 1460m
        exp_alerts: []
  # Test: the most recent recovery test job succeeds - alert should NOT fire even after 1 day.
  - interval: 1m
    input_series:
      # start_time equals the time (in seconds) at which the job starts, so each series only appears from that point on.
      # An older job starts at 60s (minute 1) and fails, then a newer job starts at 120s (minute 2) and succeeds.
      - series: 'kube_job_status_start_time{job_name="grafana-postgresql-recovery-test-001", namespace="monitoring", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x1 60+0x1444"
      - series: 'kube_job_failed{job_name="grafana-postgresql-recovery-test-001", namespace="monitoring", condition="true", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x1 1+0x1444"
      - series: 'kube_job_status_start_time{job_name="grafana-postgresql-recovery-test-002", namespace="monitoring", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x2 120+0x1443"
      - series: 'kube_job_complete{job_name="grafana-postgresql-recovery-test-002", namespace="monitoring", condition="true", cluster_id="golem", installation="golem", pipeline="stable", provider="aws"}'
        values: "_x2 1+0x1443"
    alert_rule_test:
      - alertname: GrafanaPostgresqlRecoveryTestFailed
        eval_time: 1445m
        exp_alerts: []
