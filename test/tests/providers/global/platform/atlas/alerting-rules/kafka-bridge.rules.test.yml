---
rule_files:
  - kafka-bridge.rules.yml

tests:
  - interval: 1m
    input_series:
      - series: 'kafka_producer_producer_metrics_request_latency_avg{client_id="my-client", container="my-bridge-bridge"}'
        values: "20+0x10"
    alert_rule_test:
      - alertname: KafkaBridgeAvgProducerLatency
        eval_time: 5m
        exp_alerts:
          - exp_labels:
              area: platform
              client_id: my-client
              container: my-bridge-bridge
              severity: none
              team: atlas
              topic: kafka
            exp_annotations:
              description: "The average producer request latency is 20 on my-client"
              summary: "Kafka Bridge producer average request latency"
