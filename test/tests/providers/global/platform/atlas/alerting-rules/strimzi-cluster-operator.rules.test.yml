---
rule_files:
  - strimzi-cluster-operator.rules.yml

tests:
  - interval: 1m
    input_series: []
    alert_rule_test:
      - alertname: StrimziClusterOperatorContainerDown
        eval_time: 5m
        exp_alerts:
          - exp_labels:
              area: platform
              container: strimzi-cluster-operator
              severity: none
              team: atlas
              topic: kafka
            exp_annotations:
              description: "The Strimzi Cluster Operator has been down for longer than 90 seconds."
              summary: "Strimzi Cluster Operator down."
