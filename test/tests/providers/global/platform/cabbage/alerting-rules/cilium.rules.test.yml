---
rule_files:
  - cilium.rules.yml

tests:
  - interval: 1m
    input_series:
      # For the first 60min: test with 1 pod: none, up, down
      - series: 'cilium_bpf_map_pressure{map_name="policy_00001"}'
        values: "_x20 20+0x20 90+0x20"
    alert_rule_test:
      - alertname: CiliumBPFMapAlmostFull
        eval_time: 10m
      - alertname: CiliumBPFMapAlmostFull
        eval_time: 30m
      - alertname: CiliumBPFMapAlmostFull
        eval_time: 50m
        exp_alerts:
          - exp_labels:
              area: platform
              severity: page
              team: cabbage
              topic: cilium
              cancel_if_outside_working_hours: "true"
              map_name: "policy_00001"
            exp_annotations:
              description: "Cilium BPF map is about to fill up."
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-bpf-map/
  - interval: 1m
    input_series:
      - series: 'cilium_bpf_map_pressure{map_name="policy_00001"}'
        values: "_x20 20+0x20 90+0x20 98+0x20"
    alert_rule_test:
      - alertname: CiliumBPFMapFull
        eval_time: 10m
      - alertname: CiliumBPFMapFull
        eval_time: 30m
      - alertname: CiliumBPFMapFull
        eval_time: 70m
        exp_alerts:
          - exp_labels:
              area: platform
              severity: page
              team: cabbage
              topic: cilium
              map_name: "policy_00001"
            exp_annotations:
              description: "Cilium BPF map is about filled up."
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-bpf-map/
  # CiliumNetworkPolicyFailed for 1.15+ (cilium_policy_change_total{outcome="fail.*"})
  - interval: 1m
    input_series:
      # For the first 60min: test with 1 pod: none, up, down
      - series: 'cilium_policy_change_total{outcome="fail"}'
        values: "_x20 0+0x20 0+100x30 _x1000"
      - series: 'cilium_policy_change_total{outcome="success"}'
        values: "_x120 1+10000x50 _x1000"
      - series: 'cilium_policy_import_errors_total{}'
        values: "_x220 0+0x20 0+100x30 _x1000"
    alert_rule_test:
      # cilium_policy_change_total{outcome="fail"}
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 10m
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 30m
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 60m
        exp_alerts:
          - exp_labels:
              area: platform
              severity: page
              team: cabbage
              topic: cilium
              cancel_if_outside_working_hours: "true"
            exp_annotations:
              description: "Too many Cilium Network Policy errors."
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/unsupported-cilium-network-policy/
      # cilium_policy_change_total{outcome="success"}
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 110m
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 130m
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 160m
      # cilium_policy_import_errors_total{}
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 210m
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 230m
      - alertname: CiliumNetworkPolicyFailed
        eval_time: 260m
        exp_alerts:
          - exp_labels:
              area: platform
              severity: page
              team: cabbage
              topic: cilium
              cancel_if_outside_working_hours: "true"
            exp_annotations:
              description: "Too many Cilium Network Policy errors."
              runbook_url: https://intranet.giantswarm.io/docs/support-and-ops/runbooks/unsupported-cilium-network-policy/
  # CiliumHubbleTLSCertificateWillExpireSoon
  - interval: 1m
    input_series:
      # hubble cert: valid for 40 days during the first hour, then 20 days remaining
      - series: 'cert_exporter_secret_not_after{name="hubble-server-certs", exported_namespace="kube-system", secretkey="tls.crt", installation="alba", cluster_id="odp01"}'
        values: "3456000+0x59 1728000+0x120"
      # non-hubble cert about to expire: must NOT match the name filter
      - series: 'cert_exporter_secret_not_after{name="some-other-certs", exported_namespace="kube-system", secretkey="tls.crt", installation="alba", cluster_id="odp01"}'
        values: "864000+0x180"
    alert_rule_test:
      - alertname: CiliumHubbleTLSCertificateWillExpireSoon
        eval_time: 30m
      - alertname: CiliumHubbleTLSCertificateWillExpireSoon
        eval_time: 90m
        exp_alerts:
          - exp_labels:
              area: platform
              severity: page
              team: cabbage
              topic: cilium
              cancel_if_outside_working_hours: "true"
              name: hubble-server-certs
              exported_namespace: kube-system
              secretkey: tls.crt
              installation: alba
              cluster_id: odp01
            exp_annotations:
              description: "Hubble TLS certificate tls.crt in Secret kube-system/hubble-server-certs on alba/odp01 will expire in less than 30 days. Hubble certificate renewal is broken on this cluster; hubble-relay will lose flow data when the certificate expires."
              runbook_url: "https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-hubble-tls-certificates/?INSTALLATION=alba&CLUSTER=odp01"
  # CiliumHubbleCertificateRenewalJobFailed
  - interval: 1m
    input_series:
      # certgen job starts failing after 30 minutes
      - series: 'kube_job_failed{namespace="kube-system", job_name="hubble-generate-certs-a1b2c", condition="true", installation="alba", cluster_id="odp01"}'
        values: "0+0x29 1+0x90"
      # failed job with another name: must NOT match the job_name filter
      - series: 'kube_job_failed{namespace="kube-system", job_name="some-other-job", condition="true", installation="alba", cluster_id="odp01"}'
        values: "1+0x120"
    alert_rule_test:
      - alertname: CiliumHubbleCertificateRenewalJobFailed
        eval_time: 20m
      - alertname: CiliumHubbleCertificateRenewalJobFailed
        eval_time: 35m
      - alertname: CiliumHubbleCertificateRenewalJobFailed
        eval_time: 60m
        exp_alerts:
          - exp_labels:
              area: platform
              severity: page
              team: cabbage
              topic: cilium
              cancel_if_outside_working_hours: "true"
              cancel_if_kube_state_metrics_down: "true"
              namespace: kube-system
              job_name: hubble-generate-certs-a1b2c
              condition: "true"
              installation: alba
              cluster_id: odp01
            exp_annotations:
              description: "Hubble certificate renewal job kube-system/hubble-generate-certs-a1b2c on alba/odp01 failed. Certgen may be refusing to renew leaf certificates because the Cilium CA is close to expiry."
              runbook_url: "https://intranet.giantswarm.io/docs/support-and-ops/runbooks/cilium-hubble-tls-certificates/?INSTALLATION=alba&CLUSTER=odp01"
